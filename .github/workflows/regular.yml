name: DOU Regular

on:
  schedule:
    - cron: '8 8 * * *'   # 05:00 BRT — entrega esperada até 07:30 BRT absorvendo delay do GitHub
  # Disparo externo, em horario exato. O cron agendado atrasa de 80 a 176 min
  # (mediana 121, medido em 14 dias), e com isso o DOU so ficava pronto depois
  # das 7h em 9 dos 14 dias. Um agendador de fora chama
  # POST /repos/meduardamo/DOU/dispatches com {"event_type": "raspar-dou"}
  # e o run comeca em segundos. O cron abaixo fica como rede de seguranca.
  repository_dispatch:
    types: [raspar-dou]

  workflow_dispatch:
    inputs:
      data:
        description: "Backfill de um dia (dd-mm-aaaa). Vazio = hoje."
        required: false
        default: ""

# Uma rodada por vez. Com o disparo externo somado ao cron de seguranca, dois
# gatilhos podem se sobrepor num dia de atraso; aconteceu ao vivo em 21/07,
# quando tres test runs rodaram juntos. Duas raspagens simultaneas do mesmo dia
# significam trabalho duplicado e risco de notificacao repetida pra equipe.
concurrency:
  group: dou-regular
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json from secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          python - <<'PY'
          import os, json, pathlib

          raw = os.environ.get("GOOGLE_APPLICATION_CREDENTIALS_JSON")
          if not raw:
              raise SystemExit("❌ Secret GOOGLE_APPLICATION_CREDENTIALS_JSON não encontrado.")

          info = json.loads(raw)

          if "private_key" in info and "\\n" in info["private_key"]:
              info["private_key"] = info["private_key"].replace("\\n", "\n")

          pathlib.Path("credentials.json").write_text(json.dumps(info), encoding="utf-8")
          print("✅ credentials.json criado")
          PY

      - name: Run DOU scraping regular
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          PLANILHA: ${{ secrets.PLANILHA }}
          PLANILHA_CLIENTES: ${{ secrets.PLANILHA_CLIENTES }}
          EMAIL: ${{ secrets.EMAIL }}
          DESTINATARIOS: ${{ secrets.DESTINATARIOS }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DOU_DATE: ${{ github.event.inputs.data }}  # backfill dd-mm-aaaa; vazio = hoje
        run: |
          python dou_unificado.py regular

      - name: Run DOU alignment per client tabs
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          PLANILHA_CLIENTES: ${{ secrets.PLANILHA_CLIENTES }}
          GENAI_API_KEY: ${{ secrets.GENAI_API_KEY }}
        run: |
          python alinhamento_dou.py
